apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: customer-acmecorp
  labels:
    app: demo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
      - name: demo-app
        # Replace with your Docker Hub image after building:
        # docker build -t <your-dockerhub-username>/coedge-kaas-demo:latest ./app
        # docker push <your-dockerhub-username>/coedge-kaas-demo:latest
        image: nginx:alpine   # placeholder — replace with your built image
        # image: <your-dockerhub-username>/coedge-kaas-demo:latest
        ports:
        - containerPort: 3000
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: PORT
          value: "3000"
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
          limits:
            cpu: "500m"
            memory: "128Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 3
          periodSeconds: 5
