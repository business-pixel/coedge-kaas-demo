apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: demo-app-hpa
  namespace: customer-acmecorp
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: demo-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 30   # Low threshold so HPA triggers easily in testing
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30   # Scale up fast for testing
      policies:
      - type: Pods
        value: 2
        periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 120  # Wait 2 min before scaling down
      policies:
      - type: Pods
        value: 1
        periodSeconds: 60
